services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: kanban_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kanban_net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── NestJS backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: kanban_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        8000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET:  ${JWT_SECRET}
      SALT_ROUND:  ${SALT_ROUND}
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - kanban_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/doc || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Nuxt SSR frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
    container_name: kanban_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      # SSR server → backend direct (internal docker network, no nginx hop)
      NUXT_API_BASE:         http://backend:8000
      # Browser → through nginx (same origin, nginx strips /api prefix)
      NUXT_PUBLIC_API_BASE:  ${NUXT_PUBLIC_API_BASE:-/api}
    networks:
      - kanban_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: kanban_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    networks:
      - kanban_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  kanban_net:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
